{% extends "main/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
    <h2>{{ page_title }}</h2>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn primary" type="submit">{{ submit_label }}</button>
        </form>
    </div>
{% endblock %}
